name: Integration Readiness

on:
  pull_request:
    branches:
      - main
      - release/rc1-integration
  push:
    branches:
      - fix/integration-readiness
      - release/rc1-integration

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build production application
        run: npm run build
