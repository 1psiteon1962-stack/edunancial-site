[build]
command = "npm run build"
publish = ".next"

[build.environment]
NODE_VERSION = "22"
NETLIFY_NEXT_PLUGIN_SKIP_FORMS = "true"

[[plugins]]
package = "@netlify/plugin-nextjs"

# Canonical origin redirects must preserve HTTP methods for API requests.
# Using 301 for POST can be rewritten to GET by some clients, which breaks
# method-specific API handlers (e.g. /api/admin/content/upload/presign).
[[redirects]]
  from = "http://edunancial.com/*"
  to = "https://edunancial.com/:splat"
  status = 308
  force = true

[[redirects]]
  from = "http://www.edunancial.com/*"
  to = "https://edunancial.com/:splat"
  status = 308
  force = true

[[redirects]]
  from = "https://www.edunancial.com/*"
  to = "https://edunancial.com/:splat"
  status = 308
  force = true

# API routes must never be cached.  A prior 404 response from a misconfigured
# deployment (e.g. a SPA catch-all rewrite) must not be served from the Netlify
# CDN after the routing is fixed.  This [[headers]] block is processed by
# Netlify from netlify.toml directly — it is the most reliable way to apply
# headers regardless of which _headers file is picked up from the publish
# directory.
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
