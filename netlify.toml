[build]
command = "npm run build"
publish = ".next"

[build.environment]
NODE_VERSION = "22"
NETLIFY_NEXT_PLUGIN_SKIP_FORMS = "true"

# Deploy-preview context: inherits production build settings.
# Only the active production site (edunancial.com) should build deploy previews
# for this repository.  If this file is processed by a different Netlify site,
# the deploy-preview will still run but will not be the authoritative check.
# See docs/NETLIFY-INTEGRATION-CLEANUP.md for instructions on removing stale
# Netlify site connections that post obsolete status checks to GitHub.
[context.deploy-preview]
command = "npm run build"

[[plugins]]
package = "@netlify/plugin-nextjs"

# API routes must never be cached.  A prior 404 response from a misconfigured
# deployment (e.g. a SPA catch-all rewrite) must not be served from the Netlify
# CDN after the routing is fixed.  This [[headers]] block is processed by
# Netlify from netlify.toml directly — it is the most reliable way to apply
# headers regardless of which _headers file is picked up from the publish
# directory.
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
